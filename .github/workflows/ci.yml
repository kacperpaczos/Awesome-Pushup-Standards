name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NX_NON_NATIVE_HASHER: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  format:
    runs-on: ubuntu-latest
    name: Format check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: nrwl/nx-set-shas@v4
      - run: npm ci
      - run: npm run format

  lint:
    runs-on: ubuntu-latest
    name: Linter
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: nrwl/nx-set-shas@v4
      - run: npm ci
      - run: npx nx affected -t lint --parallel=3

  unit-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Unit tests
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: nrwl/nx-set-shas@v4
      - run: npm ci
      - name: Run full test suite (Linux)
        if: runner.os == 'Linux'
        run: npx nx affected -t test --parallel=3
      - name: Smoke tests (Windows/macOS)
        if: runner.os != 'Linux'
        run: npx nx run cicd-quality:test && npx nx run contributor-hygiene:test && npx nx run release-quality:test

  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: nrwl/nx-set-shas@v4
      - run: npm ci
      - run: npx nx affected -t build --parallel=3

  int-test:
    runs-on: ubuntu-latest
    name: Integration tests
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx nx run awesome-pushup-standards:int-test

  pkg-pr-new:
    runs-on: ubuntu-latest
    name: Package preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx pkg-pr-new publish './packages/plugins/*' './packages/presets/*'
